<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Solo Leveling — Release Countdown</title>
		<style>
			:root{--bg:#0b0f1a;--card:#0f1724;--accent:#ffb86b;--muted:#9aa4b2}
			html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial}
			body{display:flex;align-items:center;justify-content:center;background-image:linear-gradient(rgba(2,6,20,0.64),rgba(2,6,20,0.64)), url('solo-leveling-has-earn-estimate-of-100-millions-in-1-month-v0-rZ-_dyYzaF4mSffnc4hHxX9NF4aOKGaYo7yo7B-3hlY.webp');background-size:cover;background-position:center center;background-repeat:no-repeat;color:#e6eef8}
			.card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.02));padding:36px;border-radius:12px;box-shadow:0 10px 30px rgba(2,6,23,0.6);max-width:840px;width:90%;text-align:center}
			h1{margin:0;font-size:clamp(24px,4vw,40px);letter-spacing:0.02em}
			p.lead{margin:8px 0 22px;color:var(--muted)}
			.date{color:var(--accent);font-weight:600}
			.countdown{display:flex;gap:14px;justify-content:center;margin:18px 0}
			.timebox{background:rgba(255,255,255,0.03);padding:18px 14px;border-radius:8px;min-width:88px}
			.num{font-size:clamp(22px,4vw,36px);font-weight:700}
			.label{font-size:12px;color:var(--muted);margin-top:6px}
			.controls{margin-top:18px}
			button{background:var(--accent);border:0;padding:10px 14px;border-radius:8px;color:#071226;font-weight:700;cursor:pointer}
			.muted{color:var(--muted);font-size:13px;margin-top:12px}
			@media (max-width:480px){.countdown{flex-wrap:wrap}.timebox{min-width:64px;padding:12px}}
		</style>
	   
		.back
	</head>
	<body>
		<main class="card" role="main">
			<h1>Solo Leveling — Official Release</h1>
			<p class="lead">Next release scheduled for <span class="date">29 December 2026</span>. Countdown to launch:</p>

			<section aria-label="Countdown timer" class="countdown" id="countdown">
				<div class="timebox">
					<div class="num" id="days">0</div>
					<div class="label">Days</div>
				</div>
				<div class="timebox">
					<div class="num" id="hours">00</div>
					<div class="label">Hours</div>
				</div>
				<div class="timebox">
					<div class="num" id="minutes">00</div>
					<div class="label">Minutes</div>
				</div>
				<div class="timebox">
					<div class="num" id="seconds">00</div>
					<div class="label">Seconds</div>
				</div>
			</section>

			<div class="muted">Auto-starts on page load. Time shown in your local timezone.</div>
		</main>

		<script>
			// Target: 29 December 2026 at 00:00 local time
			const target = new Date(2026, 11, 29, 0, 0, 0);

			const $d = document.getElementById('days');
			const $h = document.getElementById('hours');
			const $m = document.getElementById('minutes');
			const $s = document.getElementById('seconds');

			let timerId = null;

			function pad(n){return String(n).padStart(2,'0')}

			function update(){
				const now = new Date();
				let diff = target - now;

				if (diff <= 0) {
					clearInterval(timerId);
					$d.textContent = '0';
					$h.textContent = '00';
					$m.textContent = '00';
					$s.textContent = '00';
					document.querySelector('.lead').textContent = 'Released! Enjoy.';
					return;
				}

				const sec = Math.floor(diff / 1000) % 60;
				const min = Math.floor(diff / (1000 * 60)) % 60;
				const hrs = Math.floor(diff / (1000 * 60 * 60)) % 24;
				const days = Math.floor(diff / (1000 * 60 * 60 * 24));

				$d.textContent = days;
				$h.textContent = pad(hrs);
				$m.textContent = pad(min);
				$s.textContent = pad(sec);
			}

			// Auto-start on load
			update();
			timerId = setInterval(update, 1000);
		</script>
	</body>
</html>
